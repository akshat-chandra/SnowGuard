manifest_version: 1

artifacts:
  setup_script: setup_script.sql
  readme: README.md
  default_streamlit: ui.snowguard_dashboard

privileges:
  - IMPORTED PRIVILEGES ON SNOWFLAKE DB:
      description: "Required to access ACCOUNT_USAGE views for table metadata and query history"

